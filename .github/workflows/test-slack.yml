name: Test Slack Webhook

on:
  workflow_dispatch:

jobs:
  test-slack:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ Slack webhook test successful! This means your SLACK_WEBHOOK_URL is set up correctly.\nMonitor Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
